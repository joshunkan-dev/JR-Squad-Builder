<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joshua Reports USMNT Database</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar db-topbar">
      <h1>2026 USMNT Database</h1>
      <small>last updated 3/3/2026</small>
      <p>Search and filter the USMNT player pool.</p>
      <nav class="db-nav" aria-label="Primary navigation">
        <a href="squadBuilder.html">Squad Builder</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main class="db-layout">
      <aside class="db-filters">
        <h2>Search Filters</h2>

        <label>Player name
          <input id="filter-name" type="search" placeholder="Type a player name" />
        </label>

        <label>Position
          <select id="filter-position">
            <option value="">Any</option>
            <option value="ST">ST</option>
            <option value="winger">Winger</option>
            <option value="center-mid">Center Mid</option>
            <option value="fullback">Fullback</option>
            <option value="center-back">Center Back</option>
            <option value="GK">GK</option>
          </select>
        </label>

        <label>Age min
          <input id="filter-age-min" type="number" min="15" max="45" />
        </label>

        <label>Age max
          <input id="filter-age-max" type="number" min="15" max="45" />
        </label>

        <label>Club country
          <select id="filter-club-country"></select>
        </label>

        <label>Eligible country
          <select id="filter-eligible-country"></select>
        </label>

        <label>Dual national filter
          <select id="filter-dual">
            <option value="all">All players</option>
            <option value="uncapped">Uncapped dual nationals only</option>
            <option value="dual">All dual nationals</option>
          </select>
        </label>

        <button id="filter-submit" type="button">Submit</button>
      </aside>

      <section class="db-results-wrap">
        <div class="db-results-head">
          <h2>USMNT Player Database</h2>
          <span id="result-count"></span>
        </div>
        <div id="db-results" class="db-results"></div>
        <div id="pagination" class="pagination"></div>
      </section>
    </main>

    <dialog id="player-modal" class="player-modal">
      <div class="modal-head">
        <h3 id="modal-title"></h3>
        <button id="modal-close" type="button" aria-label="Close modal">×</button>
      </div>
      <div id="modal-body"></div>
    </dialog>

    <script src="data.js"></script>
    <script src="database.js"></script>
  </body>
</html>
