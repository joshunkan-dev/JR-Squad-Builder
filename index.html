<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joshua Report's USMNT Database</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Joshua Report's USMNT Database</h1>
      <p>Drag player cards onto the pitch to build your starting XI.</p>
    </header>

    <main class="layout">
      <aside class="panel" aria-label="Player pool">
        <div class="panel-header">
          <h2>Player Pool</h2>
          <input id="player-search" type="search" placeholder="Search by name or position" />
        </div>
        <div id="player-list" class="player-list" aria-live="polite"></div>
      </aside>

      <section class="pitch-wrap" aria-label="Formation board">
        <div class="board-toolbar">
          <label for="formation-select">Formation</label>
          <select id="formation-select">
            <option value="433" selected>4-3-3</option>
            <option value="442">4-4-2</option>
            <option value="3421">3-4-2-1</option>
          </select>
          <button id="clear-btn" type="button">Clear Lineup</button>
        </div>

        <div id="pitch" class="pitch" role="grid" aria-label="Soccer pitch"></div>
      </section>
    </main>

    <template id="player-card-template">
      <article class="player-card" draggable="true">
        <button class="remove-btn" type="button" aria-label="Remove from lineup">×</button>
        <img class="player-face" alt="" loading="lazy" />
        <div class="player-meta">
          <h3 class="player-last-name"></h3>
          <span class="player-position"></span>
        </div>
        <div class="player-foot">
          <div class="flag-row" aria-label="Eligible flags"></div>
          <button class="info-btn" type="button" aria-label="Player info"><em>i</em></button>
        </div>
      </article>
    </template>

    <dialog id="player-modal" class="player-modal">
      <div class="modal-head">
        <h3 id="modal-title"></h3>
        <button id="modal-close" type="button" aria-label="Close modal">×</button>
      </div>
      <div id="modal-body"></div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
